- date: '2025-02-01'
  type: Announcement
  title: News Update
  content: Our work, <em>AI-Powered Semantic Segmentation Model for Enhanced Ureteral
    Mapping and Real-Time Instrument Feedback in Robotic Surgery</em>, in collaboration
